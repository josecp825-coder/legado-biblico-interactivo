        // MOTOR DE SINCRONIZACIÓN LEGADO v39
        async function syncVersion() {
            try {
                const current = localStorage.getItem('legado_app_version');
                if (current !== "39") {
                    localStorage.setItem('legado_app_version', "39");
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        for (let key of keys) await caches.delete(key);
                    }
                    window.location.reload();
                }
            } catch (e) { }
        }
        syncVersion();
    </script>

    <!-- 🔤 SISTEMA DE FUENTE GLOBAL - Persistente + MutationObserver -->
    <script>
        (function () {
            const CLAVE_PASO = 'legado_font_paso';
            const PASOS = [0.82, 0.9, 1.0, 1.1, 1.22, 1.38, 1.55, 1.75];
            let pasoActual = parseInt(localStorage.getItem(CLAVE_PASO) || '2');

            function aplicarAEl(el, tamRem) {
                el.style.setProperty('font-size', tamRem + 'rem', 'important');
            }

            function aplicarEscala() {
                const escala = PASOS[pasoActual];
                const tamRem = parseFloat((escala * 1.08).toFixed(3));
                document.documentElement.style.setProperty('--font-scale', escala);
                document.documentElement.style.setProperty('--font-lect', tamRem + 'rem');
                document.querySelectorAll('.lectura-texto').forEach(el => aplicarAEl(el, tamRem));
                const ind = document.getElementById('font-ind');
                if (ind) ind.textContent = Math.round(escala * 100) + '%';
                localStorage.setItem(CLAVE_PASO, pasoActual);
                window._fontLectRem = tamRem;
            }

            const observer = new MutationObserver(mutations => {
                const tam = window._fontLectRem;
                if (!tam) return;
                mutations.forEach(m => {
                    m.addedNodes.forEach(node => {
                        if (node.nodeType !== 1) return;
                        if (node.classList && node.classList.contains('lectura-texto')) aplicarAEl(node, tam);
                        node.querySelectorAll && node.querySelectorAll('.lectura-texto').forEach(el => aplicarAEl(el, tam));
                    });
                });
            });

            window.fontMas = function () {
                if (pasoActual < PASOS.length - 1) { pasoActual++; aplicarEscala(); pulsoWidget(); }
            };
            window.fontMenos = function () {
                if (pasoActual > 0) { pasoActual--; aplicarEscala(); pulsoWidget(); }
            };
            window.refrescarFuente = aplicarEscala;

            function pulsoWidget() {
                const w = document.getElementById('font-widget');
                if (!w) return;
                w.style.transform = 'scale(1.1)';
                setTimeout(() => { w.style.transform = 'scale(1)'; }, 150);
            }

            document.addEventListener('DOMContentLoaded', () => {
                aplicarEscala();
                observer.observe(document.body, { childList: true, subtree: true });
            });
            if (document.readyState !== 'loading' && document.body) {
                aplicarEscala();
                observer.observe(document.body, { childList: true, subtree: true });
            }
        })();
    </script>

    <script>
        let usuarioActual = { nombre: localStorage.getItem('legado_user_name') || "Invitado", nivel: "" };

        window.onload = async () => {
            const savedName = localStorage.getItem('legado_user_name');
            if (savedName) document.getElementById('nombre-usuario').value = savedName;

            db.collection(".health_check").doc("status").get().then(() => {
                document.getElementById('db-dot').style.backgroundColor = '#2ed573';
                document.getElementById('db-text').innerText = 'NUBE CONECTADA';
            }).catch(() => {
                document.getElementById('db-text').innerText = 'MODO LOCAL';
            });

            // ✅ VERIFICAR SI HAY UN ENLACE COMPARTIDO DE CALENDARIO EN LA URL
            if (typeof verificarTokenCalendario === 'function') {
                await verificarTokenCalendario();
            }
        };

        function seleccionarNivel(nivel) {
            let nombre = document.getElementById('nombre-usuario').value.trim() || 'Invitado' + Math.floor(Math.random() * 900 + 100);
            localStorage.setItem('legado_user_name', nombre);
            usuarioActual.nombre = nombre;
            usuarioActual.nivel = nivel;

            iniciarSesionFirebase(nombre, nivel);

            const intro = document.querySelector('.intro-container');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                const pantalla = document.getElementById('pantalla-estudio');
                pantalla.className = `container-estudio theme-${nivel} is-active`;

                if (nivel === 'adolescentes') renderBibliaDinamicaTeens();
                else if (nivel === 'kids') renderModuloNinos();
                else if (nivel === 'jovenes') renderModuloJovenes();
                else if (nivel === 'adultos') renderModuloAdultos();
                window.scrollTo(0, 0);
            }, 500);
        }

        async function forzarActualizacionInmediata() {
            if (confirm("🚀 ¿Forzar descarga de la última versión ahora?\n\nEsto limpiará el caché y reiniciará la aplicación para asegurar que tengas los últimos cambios.")) {
                try {
                    // 1. Mostrar estado visual
                    const btn = document.querySelector('button[onclick="forzarActualizacionInmediata()"]');
                    if (btn) { btn.innerText = "⏳"; btn.style.animation = "none"; }

                    // 2. Limpiar Caches de forma agresiva
                    if ('caches' in window) {
                        const names = await caches.keys();
                        await Promise.all(names.map(name => caches.delete(name)));
                    }

                    // 3. Limpiar LocalStorage de control (preservando TODOS los datos del usuario)
                    const _nombre = localStorage.getItem('legado_user_name');
                    const _cultos = localStorage.getItem('legado_cultos_semanales');
                    const _liturgias = localStorage.getItem('legado_liturgias');
                    const _fuente = localStorage.getItem('legado_font_paso');
                    const _eventos = localStorage.getItem('legado_eventos'); // ✅ PROTEGIDO
                    const _predics = localStorage.getItem('legado_predicaciones'); // ✅ PROTEGIDO
                    localStorage.clear();
                    if (_nombre) localStorage.setItem('legado_user_name', _nombre);
                    if (_cultos) localStorage.setItem('legado_cultos_semanales', _cultos);
                    if (_liturgias) localStorage.setItem('legado_liturgias', _liturgias);
                    if (_fuente) localStorage.setItem('legado_font_paso', _fuente);
                    if (_eventos) localStorage.setItem('legado_eventos', _eventos); // ✅ RESTAURADO
                    if (_predics) localStorage.setItem('legado_predicaciones', _predics); // ✅ RESTAURADO

                    // 4. Desregistrar Service Workers
                    if ('serviceWorker' in navigator) {
                        const registrations = await navigator.serviceWorker.getRegistrations();
                        for (let registration of registrations) {
                            await registration.unregister();
                        }
                    }

                    // 5. Recarga dura desde el servidor (no caché)
                    window.location.reload(true);
                } catch (e) {
                    alert("Error al actualizar: " + e.message);
                    window.location.reload(true);
                }
            }
        }

        function entrarComoInvitado() {
            document.getElementById('nombre-usuario').value = 'Invitado' + Math.floor(Math.random() * 900 + 100);
        }

        function volverAlInicioLegado() {
            const pantalla = document.getElementById('pantalla-estudio');
            const intro = document.querySelector('.intro-container');
            pantalla.innerHTML = '';
            pantalla.className = 'container-estudio';
            intro.style.opacity = '0';
            intro.style.display = 'flex';
            requestAnimationFrame(() => {
                intro.style.transition = 'opacity 0.4s ease';
                intro.style.opacity = '1';
            });
            window.scrollTo(0, 0);
        }

        async function forzarLimpiezaTotal() {
            if (confirm("¿Reparar y actualizar la aplicación ahora?")) {
                // Borrar LocalStorage (preservando TODOS los datos del usuario)
                const _nombre = localStorage.getItem('legado_user_name');
                const _cultos = localStorage.getItem('legado_cultos_semanales');
                const _liturgias = localStorage.getItem('legado_liturgias');
                const _fuente = localStorage.getItem('legado_font_paso');
                const _eventos = localStorage.getItem('legado_eventos'); // ✅ PROTEGIDO
                const _predics = localStorage.getItem('legado_predicaciones'); // ✅ PROTEGIDO
                localStorage.clear();
                if (_nombre) localStorage.setItem('legado_user_name', _nombre);
                if (_cultos) localStorage.setItem('legado_cultos_semanales', _cultos);
                if (_liturgias) localStorage.setItem('legado_liturgias', _liturgias);
                if (_fuente) localStorage.setItem('legado_font_paso', _fuente);
                if (_eventos) localStorage.setItem('legado_eventos', _eventos); // ✅ RESTAURADO
                if (_predics) localStorage.setItem('legado_predicaciones', _predics); // ✅ RESTAURADO
                // Desregistrar Service Workers
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let reg of regs) await reg.unregister();
                // Borrar Caches
                const keys = await caches.keys();
                for (let key of keys) await caches.delete(key);
                // Recarga dura
                window.location.reload(true);
            }
        }
    </script>

    <!-- ✅ AUTO-UPDATE ENGINE PARA PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=39').then(reg => {
                    // Forzar búsqueda de actualización cada vez que carga
                    reg.update();

                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // Nueva versión detectada, recargar ahora!
                                window.location.reload();
                            }
                        };
                    };
                });
            });

            // Forzar actualización si hay un nuevo worker esperando
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
