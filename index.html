<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGADO BÍBLICO | Experiencia Digital</title>
    <link rel="stylesheet" href="style.css?v=12">
    <link rel="stylesheet" href="mobile.css?v=12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- ✅ PWA CONFIGURACION -->
    <link rel="manifest" href="manifest.json?v=12">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js?v=12"></script>
    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>

<body>
    <div class="intro-container">
        <div class="welcome-text">
            <div class="db-status"
                style="font-size:0.7rem;opacity:0.6;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:10px;">
                <span id="db-dot"
                    style="height:8px;width:8px;background-color:#bbb;border-radius:50%;display:inline-block;"></span>
                <span id="db-text">CONECTANDO A LA NUBE...</span>
            </div>
            <h1>LEGADO BÍBLICO</h1>
            <p>Selecciona tu nivel para comenzar</p>

            <div class="user-id-box"
                style="margin-top:20px;display:flex;flex-direction:column;align-items:center;gap:10px">
                <input type="text" id="nombre-usuario" placeholder="Tu nombre..."
                    style="padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;width:250px;text-align:center;">
                <button onclick="entrarComoInvitado()"
                    style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.5);padding:8px 22px;border-radius:20px;cursor:pointer;font-size:0.8rem;">Entrar
                    como Invitado</button>
            </div>
        </div>

        <div class="category-grid">
            <div class="category-card card-kids" onclick="seleccionarNivel('niños')">
                <div class="card-bg-icon">🎨</div>
                <div class="card-content">
                    <h2>NIÑOS</h2>
                    <p>Historias animadas</p>
                </div>
            </div>
            <div class="category-card card-teens" onclick="seleccionarNivel('adolescentes')">
                <div class="card-bg-icon">🎧</div>
                <div class="card-content">
                    <h2>ADOLESCENTES</h2>
                    <p>Retos y Trivia</p>
                </div>
            </div>
            <div class="category-card card-youth" onclick="seleccionarNivel('jovenes')">
                <div class="card-bg-icon">🚀</div>
                <div class="card-content">
                    <h2>JÓVENES</h2>
                    <p>Análisis real</p>
                </div>
            </div>
            <div class="category-card card-adults" onclick="seleccionarNivel('adultos')">
                <div class="card-bg-icon">📜</div>
                <div class="card-content">
                    <h2>ADULTOS</h2>
                    <p>Estudio profundo</p>
                </div>
            </div>
        </div>
    </div>

    <div id="pantalla-estudio" class="container-estudio"></div>

    <script src="firebase-service.js?v=12"></script>
    <script src="data_motor.js?v=12"></script>
    <script src="data_kids.js?v=12"></script>
    <script src="data_jovenes.js?v=12"></script>
    <script src="data_adultos.js?v=12"></script>
    <script src="data_teens_v5.js?v=12"></script>
    <script src="versus_engine.js?v=12"></script>

    <script>
        let usuarioActual = { nombre: localStorage.getItem('legado_user_name') || "Invitado", nivel: "" };

        window.onload = () => {
            const savedName = localStorage.getItem('legado_user_name');
            if (savedName) document.getElementById('nombre-usuario').value = savedName;

            db.collection(".health_check").doc("status").get().then(() => {
                document.getElementById('db-dot').style.backgroundColor = '#2ed573';
                document.getElementById('db-text').innerText = 'NUBE CONECTADA';
            }).catch(() => {
                document.getElementById('db-text').innerText = 'MODO LOCAL';
            });
        };

        function seleccionarNivel(nivel) {
            let nombre = document.getElementById('nombre-usuario').value.trim() || 'Invitado' + Math.floor(Math.random() * 900 + 100);
            localStorage.setItem('legado_user_name', nombre);
            usuarioActual.nombre = nombre;
            usuarioActual.nivel = nivel;

            iniciarSesionFirebase(nombre, nivel);

            const intro = document.querySelector('.intro-container');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                const pantalla = document.getElementById('pantalla-estudio');
                pantalla.className = `container-estudio theme-${nivel} is-active`;

                if (nivel === 'adolescentes') renderBibliaDinamicaTeens();
                else if (nivel === 'niños') renderModuloNinos();
                else if (nivel === 'jovenes') renderModuloJovenes();
                else if (nivel === 'adultos') renderModuloAdultos();
                window.scrollTo(0, 0);
            }, 500);
        }

        function entrarComoInvitado() {
            document.getElementById('nombre-usuario').value = 'Invitado' + Math.floor(Math.random() * 900 + 100);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=12').then(reg => {
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        };
                    };
                });
            });
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>

</html>
